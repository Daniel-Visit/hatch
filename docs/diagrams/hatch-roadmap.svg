    <text x="305" y="246" text-anchor="middle" font-size="9" fill="#94A3B8">+ 12 demo apps</text>
  </g>

  <!-- ============ COLUMN 3: Pair 2 (4+5) ============ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>
    <text x="495" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#94A3B8">PAIR 2</text>
    <rect x="420" y="120" width="150" height="58" rx="8" fill="#0F172A" stroke="#10B981" stroke-width="1.5" filter="url(#glow-emerald)"/>
    <text x="495" y="138" text-anchor="middle" font-size="12" font-weight="700" fill="#A7F3D0">Phase 4 ✓</text>
    <text x="495" y="156" text-anchor="middle" font-size="9" fill="#94A3B8">social: likes saves</text>
    <text x="495" y="168" text-anchor="middle" font-size="9" fill="#94A3B8">follows comments</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.7s" dur="0.5s" fill="freeze"/>
    <rect x="420" y="198" width="150" height="58" rx="8" fill="#0F172A" stroke="#10B981" stroke-width="1.5" filter="url(#glow-emerald)"/>
    <text x="495" y="216" text-anchor="middle" font-size="12" font-weight="700" fill="#A7F3D0">Phase 5 ✓</text>
    <text x="495" y="234" text-anchor="middle" font-size="9" fill="#94A3B8">publish flow +</text>
    <text x="495" y="246" text-anchor="middle" font-size="9" fill="#94A3B8">Storage</text>
  </g>

