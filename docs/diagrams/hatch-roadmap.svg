  <!-- ============ STATUS FOOTER ============ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="4.4s" dur="0.6s" fill="freeze"/>
    <rect x="40" y="395" width="1220" height="60" rx="8" fill="#0F172A" stroke="#22D3EE" stroke-width="1.2"/>
    <text x="60" y="418" font-size="11" font-weight="700" fill="#67E8F9">LIVE</text>
    <text x="60" y="436" font-size="10" font-family="monospace" fill="#A5F3FC">web → hatch-brown.vercel.app</text>
    <text x="60" y="450" font-size="10" font-family="monospace" fill="#A5F3FC">mcp → hatch-mcp-production.up.railway.app</text>

    <text x="420" y="418" font-size="11" font-weight="700" fill="#A7F3D0">DATA</text>
    <text x="420" y="436" font-size="10" font-family="monospace" fill="#6EE7B7">Supabase Postgres · 23 migrations applied</text>
    <text x="420" y="450" font-size="10" font-family="monospace" fill="#6EE7B7">RLS on every table · pg_cron scheduled (active)</text>

    <text x="820" y="418" font-size="11" font-weight="700" fill="#FDE68A">NEXT</text>
    <text x="820" y="436" font-size="10" font-family="monospace" fill="#FCD34D">Phase 13 polish · slice-through (variable)</text>
    <text x="820" y="450" font-size="10" font-family="monospace" fill="#FCD34D">skeletons · OG · sitemap · sentry · analytics</text>
  </g>
</svg>
