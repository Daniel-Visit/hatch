    <text x="1225" y="146" text-anchor="middle" font-size="12" font-weight="700" fill="#FDE68A">Phase 13</text>
    <text x="1225" y="162" text-anchor="middle" font-size="9" fill="#FCD34D">⏳ pending</text>
    <text x="1225" y="184" text-anchor="middle" font-size="9" fill="#94A3B8">skeletons</text>
    <text x="1225" y="196" text-anchor="middle" font-size="9" fill="#94A3B8">OG images</text>
    <text x="1225" y="208" text-anchor="middle" font-size="9" fill="#94A3B8">sitemap</text>
    <text x="1225" y="220" text-anchor="middle" font-size="9" fill="#94A3B8">sentry</text>
    <text x="1225" y="232" text-anchor="middle" font-size="9" fill="#94A3B8">analytics</text>
    <text x="1225" y="244" text-anchor="middle" font-size="9" fill="#94A3B8">error boundaries</text>

    <!-- Idle pulse on pending -->
