    <rect x="610" y="198" width="150" height="58" rx="8" fill="#0F172A" stroke="#10B981" stroke-width="1.5" filter="url(#glow-emerald)"/>
    <text x="685" y="216" text-anchor="middle" font-size="12" font-weight="700" fill="#A7F3D0">Phase 7 ✓</text>
    <text x="685" y="234" text-anchor="middle" font-size="9" fill="#94A3B8">messages inbox</text>
    <text x="685" y="246" text-anchor="middle" font-size="9" fill="#94A3B8">+ Realtime</text>
  </g>

