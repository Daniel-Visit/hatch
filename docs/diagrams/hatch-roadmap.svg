    <rect x="610" y="276" width="150" height="58" rx="8" fill="#0F172A" stroke="#64748B" stroke-width="1.5" stroke-dasharray="4,4" filter="url(#glow-slate)"/>
    <text x="685" y="294" text-anchor="middle" font-size="12" font-weight="700" fill="#94A3B8">Phase 8 ✗</text>
    <text x="685" y="312" text-anchor="middle" font-size="9" fill="#64748B" text-decoration="line-through">email (Resend)</text>
    <text x="685" y="324" text-anchor="middle" font-size="9" fill="#94A3B8">CUT — push absorbs</text>
  </g>

  <!-- ============ COLUMN 5: Pair 4 (9) ============ -->
