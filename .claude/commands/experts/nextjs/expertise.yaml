# Next.js 15 Implementation Expertise
# Hatch — Product-Hunt-for-builders
# Created: 2026-05-15 (adapt-codebase Phase 4)

overview:
  description: 'Next.js 15 App Router with React 19, Tailwind v4, and Supabase SSR integration'
  framework: 'Next.js 15.5.18'
  react_version: '19.1.0'
  css_framework: 'Tailwind v4 (PostCSS plugin @tailwindcss/postcss)'
  typescript: '5.x'
  package_manager: 'pnpm 10'

directory_structure:
  app_root: 'apps/web/'
  app_router: 'apps/web/app/'
  auth_routes: 'apps/web/app/(auth)/'
  auth_callback: 'apps/web/app/auth/callback/route.ts'
  auth_signout: 'apps/web/app/auth/sign-out/route.ts'
  lib: 'apps/web/lib/'
  supabase_helpers: 'apps/web/lib/supabase/'
  auth_utils: 'apps/web/lib/auth.ts'
  zod_schemas: 'apps/web/lib/zod/'
  server_actions: 'apps/web/lib/actions/'
  middleware: 'apps/web/middleware.ts'
  components_dir: 'apps/web/app/_components/ — shared shell/gallery components (cards, sidebar, topbar, notifications). Prototype-port; classNames byte-for-byte from prototype/apps-gallery/.'
  landing_dir: 'apps/web/app/_landing/ — sibling of _components/, reserved for the public landing page at /. Prototype-port too (sourced from /tmp/hatch-landing-v2/). See landing_convention below for the full layout.'

key_patterns:
  server_components:
    description: 'Default for all components — no use client directive'
    rule: 'Only add use client when using hooks, browser APIs, or event handlers'

  client_components:
    description: 'Components with use client directive'
    examples:
      - 'apps/web/app/(auth)/sign-in/sign-in-buttons.tsx (OAuth buttons)'
      - 'apps/web/app/settings/profile/profile-form.tsx (form with react-hook-form)'

  supabase_ssr:
    server_client: 'apps/web/lib/supabase/server.ts → createSupabaseServerClient()'
    browser_client: 'apps/web/lib/supabase/client.ts → createSupabaseBrowserClient()'
    admin_client: 'apps/web/lib/supabase/admin.ts (service role — server only)'
    rule: 'Use server client in Server Components and Route Handlers; browser client in Client Components'

  middleware:
    file: 'apps/web/middleware.ts'
    purpose: 'Refresh Supabase session cookie on every request — CRITICAL, do not remove'
    matcher: 'All routes except static assets'

  auth_helpers:
    file: 'apps/web/lib/auth.ts'
    functions:
      getUser: 'Returns {user, profile} or null — use in Server Components'
      requireUser: 'Throws UNAUTHORIZED if not authenticated — use in protected server actions'

  server_actions:
    directory: 'apps/web/lib/actions/'
    example: 'apps/web/lib/actions/profile.ts'
    pattern: 'use server directive, call requireUser(), validate with Zod, call Supabase'
    phase_5_actions:
      - 'apps/web/lib/actions/search.ts → searchApps({ query, limit }) — full-text search via apps.search_vector textSearch'
      - 'apps/web/lib/actions/{like,save,comment}.ts — toggleLike/toggleSave/postComment/toggleCommentLike now fire-and-forget sb.rpc("refresh_hot_scores").then(() => {}, () => {}) after mutation succeeds'

  zod_schemas:
    directory: 'apps/web/lib/zod/'
    example: 'apps/web/lib/zod/profile.ts'
    usage: 'Import in server actions for validation; use with react-hook-form in client components'
    phase_5_schemas:
      - 'apps/web/lib/zod/search.ts → SearchInput'
      - 'apps/web/lib/zod/api.ts → ApiAppsList, ApiAppDetail, ApiProfileDetail, ApiSearch (used by /api/v1/* + openapi.json generation)'

  rate_limit_helper:
    file: 'apps/web/lib/rate-limit.ts'
    pattern: 'Postgres-backed 60-sec bucket via increment_rate_limit RPC; uses SSR (anon) client; fails open'
    exports: 'checkRateLimit(ip) → { ok, count }; ipFromRequest(req) → string (x-forwarded-for first IP or fallback)'

  form_handling:
    library: 'react-hook-form + @hookform/resolvers + zod'
    pattern: 'Client component with useForm, zodResolver, server action on submit'

database_types:
  file: 'apps/web/lib/supabase/types.ts'
  description: 'Auto-generated Supabase TypeScript types — do NOT edit manually'
  regenerate: 'Use Supabase MCP to pull latest types after schema changes'
  tables:
    profiles:
      key_fields: 'id (uuid, FK to auth.users), handle (unique), display_name, avatar_url, bio, emoji, hue, links (jsonb), notification_prefs (jsonb), theme_pref'
    categories:
      key_fields: 'id (text, PK), label, icon, sort_order'
    featured_apps:
      key_fields: 'week_of (date, PK), app_id (FK apps), reason (text default hot_score), created_at — Phase 10'
    api_rate_limits:
      key_fields: '(ip, bucket_start) PK, count — Phase 12 (no client access)'

routing_conventions:
  protected_routes: 'Under app/(auth)/ — auth check via middleware + requireUser()'
  public_routes: |
    app/page.tsx is now the LANDING ORCHESTRATOR (public marketing page, NOT the gallery).
    Auth-aware: signed-in users are redirected from / to /gallery via getUser() + redirect('/gallery').
    Other public routes: app/(shell)/gallery/page.tsx (gallery — viewable by anyone, no auth required),
    app/a/[slug], app/c/[category], app/u/[handle], app/auth/callback/, app/auth/sign-out/.
  public_route_list:
    - '/                        — public landing (Server Component orchestrator; redirects signed-in users to /gallery)'
    - '/gallery                 — gallery home (was at / before commit d74dd6f; viewable by anyone)'
    - '/a/[slug]                — app detail'
    - '/c/[category]            — category-filtered gallery'
    - '/u/[handle]              — public profile'
    - '/auth/callback           — OAuth callback'
    - '/auth/sign-out           — sign-out route'
  signed_in_routes: 'app/publish, app/notifications, app/messages, app/messages/[conversationId], app/settings/profile, app/settings/notifications — each calls requireUser() with redirect to /sign-in?next=<path> on failure'
  api_routes: 'app/api/ pattern (none yet in Phase 0-7)'
  settings: 'app/settings/profile/ (profile), app/settings/notifications/ (Phase 6 — push prefs + browser permission toggle)'
  dynamic_export: "Routes with realtime data set `export const dynamic = 'force-dynamic'` to prevent stale RSC cache (e.g., /notifications, /messages). Do NOT combine with `export const revalidate = N` — mutually exclusive."

landing_convention:
  description: |
    The public landing page at / is a Server Component orchestrator at apps/web/app/page.tsx (~58 lines)
    that composes 11 sections from apps/web/app/_landing/. Designed as a 1:1 prototype port from
    /tmp/hatch-landing-v2/. The full prototype-port exception applies — Tailwind FORBIDDEN, classNames
    byte-for-byte from source, inline style={{...}} REQUIRED where the prototype uses it. See
    .claude/rules/prototype-port-exception.md (now covers apps/web/app/_landing/** in addition to
    apps/web/app/_components/**).
  shared_primitives_in_topbar: |
    apps/web/app/_landing/topbar.tsx is a 'use client' component that composes the SAME shared
    primitives as apps/web/app/_components/shell.tsx (right cluster, lines 97-156):
      - useTheme from @/app/_components/theme-controller
      - LocaleToggle from @/app/_components/locale-toggle
      - Icon from @/app/_components/icons (name="plus" for Publish button)
    This keeps the landing topbar and the shell topbar pixel-identical without code duplication.
  cross_tree_imports: |
    Cross-tree imports _landing → _components are INTENTIONAL and allowed. The landing pulls shared
    primitives (theme controller, locale toggle, icon registry) from _components/ to avoid duplicating
    implementations. Do not refactor these imports back to local copies.
  theme_single_source_of_truth: |
    theme-controller (_components/theme-controller.tsx) is the single source of truth for theme
    state across BOTH the landing page and the shell. The prior pattern (landing owned its own
    useState-based theme block; shell used useTheme) has been removed. Theme selection now persists
    across landing ↔ shell route boundaries via the shared controller + localStorage.
  orchestrator:
    file: 'apps/web/app/page.tsx'
    pattern: |
      Server Component: const { user } = await getUser(); if (user) redirect('/gallery');
      const data = await fetchLandingData();
      return (<>...11 sections in prototype order...</>)
    isr: "export const revalidate = 60 — 60-second ISR. Marketing page; small lag acceptable. Do NOT combine with dynamic = 'force-dynamic'."
    imports_css: "import './landing.css' at the top of page.tsx"
  atoms:
    - 'apps/web/app/_landing/icons.tsx — 24 named icon exports'
    - 'apps/web/app/_landing/logo.tsx'
    - "apps/web/app/_landing/avatar.tsx — exports LandingAvatar (renamed to avoid colliding with _components/cards.tsx Avatar)"
    - "apps/web/app/_landing/mini-app-card.tsx — 'use client' for like-button state"
    - 'apps/web/app/_landing/float-notif.tsx'
    - 'apps/web/app/_landing/topbar.tsx'
    - 'apps/web/app/_landing/footer.tsx'
  sections_server:
    - 'apps/web/app/_landing/hero.tsx'
    - 'apps/web/app/_landing/social-proof.tsx'
    - 'apps/web/app/_landing/bento.tsx (+ bento/{publish,art,contact,notifs,ranking}-vis.tsx — 5 visualization cells)'
    - 'apps/web/app/_landing/how-it-works.tsx'
    - 'apps/web/app/_landing/for-investors.tsx'
    - 'apps/web/app/_landing/agents.tsx (consumes MCP_TOOLS from @hatch/shared)'
    - 'apps/web/app/_landing/testimonials.tsx'
    - 'apps/web/app/_landing/final-cta.tsx'
  sections_client:
    - "apps/web/app/_landing/gallery-preview.tsx — 'use client' for Hot/New/Loved tab state. Imports AppRow as TYPE-ONLY from ./data."

landing_data_pattern:
  helper_file: 'apps/web/app/_landing/data.ts (server-only)'
  exports:
    AppRow: 'The single shape consumed by every landing section (id, slug, title, tagline, hero_url, author, category_label, like/save counts, etc.). Resolves category UUID → human label server-side via a Map<string,string> lookup so the client only ever sees the label.'
    fetchLandingData: 'async () => { heroApps, tabs: { hot, new, loved }, counts } — runs 7 queries in Promise.all against the service-role admin client. All queried tables are publicly readable; no per-request auth needed.'
    LandingData: 'Return type of fetchLandingData()'
  fk_disambiguation: "Uses FK constraint name disambiguation in the embedded select: author:profiles!apps_author_id_fkey(...). Required because apps has multiple FKs to profiles."
  client_import_rule: |
    When importing AppRow into a Client Component (e.g. gallery-preview.tsx), you MUST use
    `import type { AppRow } from './data'` — NEVER a value import. A value import would drag
    createSupabaseAdminClient (server-only) into the client bundle and break the build.

i18n_patterns:
  library: 'next-intl'
  landing_namespace: |
    All landing page strings live under the `Landing.*` namespace in
    apps/web/messages/{en,es}.json (~162 keys total). Top-level segments (PascalCase):
      Landing.Topbar, Landing.Hero, Landing.SocialProof, Landing.Bento (+ 5 vis sub-keys),
      Landing.HowItWorks, Landing.ForInvestors, Landing.Agents, Landing.GalleryPreview,
      Landing.Testimonials, Landing.FinalCta, Landing.Footer, Landing.MiniAppCard
  key_convention: 'PascalCase segments, dotted paths (e.g. Landing.Topbar.Nav.Features)'
  server_components: "Server Components use `getTranslations('Landing.SectionName')` (async import from next-intl/server)"
  client_components: "Client Components use `useTranslations('Landing.SectionName')` (hook, requires 'use client')"
  rich_text: |
    Rich text values use t.rich('Key', { tagRenderers }) pattern:
      - <grad>...</grad> — gradient text span (CSS class "grad")
      - <b>...</b> — bold inline span
      - <br></br> — line break element
      - <code>...</code> — inline code span
    Example: t.rich('Title', { grad: (c) => <span className="grad">{c}</span>, br: () => <br /> })
  topbar_client_note: |
    apps/web/app/_landing/topbar.tsx is 'use client' and uses useTranslations('Landing.Topbar').
    It is the only landing atom that is a client component purely for useTheme + useTranslations.

mcp_tools_shared_source:
  file: 'packages/shared/src/mcp-tools.ts'
  exports:
    MCP_TOOLS: 'readonly string[] — 15 entries; the canonical surface of MCP tool names'
    MCP_TOOL_GROUPS: 'grouped by capability (read / publish / social)'
  re_export: 'Re-exported via packages/shared/src/index.ts → import { MCP_TOOLS } from "@hatch/shared"'
  consumers:
    - 'apps/web/app/_landing/agents.tsx — landing page agents section (marketing surface stays in sync with real MCP server registrations)'
    - 'apps/mcp/* — MCP server registrations (single source of truth)'
  shared_index_note: |
    packages/shared/src/index.ts re-exports now use `export * from './types';` (NO .js extension).
    Safe because MCP consumers use `import type { Database } from '@hatch/shared'` (type-only,
    erased at compile). Next.js webpack also resolves no-ext imports correctly.

phase_5_routes:
  public_pages:
    - '/search?q=<query>           — full-text search results (Server Component)'
    - '/trending                   — apps from last 7 days ordered by hot_score'
    - '/following                  — auth-gated; apps from people you follow'
  public_api:
    base: '/api/v1/*'
    cors: 'open (Access-Control-Allow-Origin: *)'
    rate_limit: '60 req/min/IP via Postgres counter (fails open on DB errors)'
    endpoints:
      - 'GET /api/v1/apps           — list (cursor pagination by published_at)'
      - 'GET /api/v1/apps/{slug}    — single app + author'
      - 'GET /api/v1/profiles/{handle} — profile + their apps'
      - 'GET /api/v1/categories'
      - 'GET /api/v1/search?q='
      - 'GET /api/v1/openapi.json   — OpenAPI 3 generated from Zod via @asteasolutions/zod-to-openapi'
  cron_routes:
    auth: 'Bearer ${CRON_SECRET} header (Vercel Cron injects, env var set in Vercel Project Settings)'
    schedule_file: 'vercel.json at REPO ROOT, "crons" array'
    endpoints:
      - 'GET /api/cron/refresh-scores  — every 15 min (*/15 * * * *) calls refresh_hot_scores RPC'
      - 'GET /api/cron/pick-featured   — Mondays 09:00 UTC (0 9 * * 1) calls pick_featured_app RPC'
  agent_routes:
    - '/llms.txt — llmstxt.org-format index of all public URLs + MCP info'

realtime_patterns:
  hook_location: 'apps/web/app/_components/use-realtime-*.ts (3 hooks: useUnreadTitle, useRealtimeNotifs, useRealtimeThread)'
  subscription_pattern: |
    'use client';
    const sb = createSupabaseBrowserClient();
    const channel = sb.channel(`notifs:${userId}`)
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'notifications', filter: `recipient_id=eq.${userId}` }, payload => onInsert(payload.new))
      .subscribe();
    return () => sb.removeChannel(channel);
  visibility_backfill: 'visibilitychange listener with hiddenSinceRef tracking — if hidden >30s, refetch latest 50 on visible, resubscribe channel. Implements SPEC §8.3.'
  toast_routing: 'sonner Toaster mounted at root layout. Per SPEC roadmap §5.3: contact_request → high-priority toast + push; message → toast + push if not in /messages/<id>; comment_reply → toast only; like/follow/comment → bell only.'
  dedupe_strategy: 'Realtime INSERT events can race with optimistic local updates — always dedupe by id when merging into local state'

web_push_patterns:
  server_side: 'apps/web/lib/push/server.ts — pushToUser(userId, payload) using web-push npm pkg. NEVER imported from client (no_vapid_private_in_client.py validator blocks). Uses service-role admin client to read push_subscriptions (RLS bypass). On 410 Gone response, deletes stale subscription.'
  client_side: 'apps/web/lib/push/client.ts — subscribeToBrowserPush() does Notification.requestPermission + serviceWorker.register("/sw.js") + pushManager.subscribe + posts subscription to subscribeToPush server action. unsubscribeFromBrowserPush() reverses.'
  service_worker: 'apps/web/public/sw.js — vanilla JS (no compilation). Handles push event (showNotification), notificationclick (focus existing tab or openWindow), pushsubscriptionchange (warn-only, Phase 13 refresh). NO fetch handler to keep OAuth callbacks unintercepted.'
  vapid_envs: 'NEXT_PUBLIC_VAPID_PUBLIC_KEY (browser-safe) + VAPID_PRIVATE_KEY (server-only, validator-enforced). Generated via npx web-push generate-vapid-keys'

ui_components:
  port_exception_scope: |
    Tailwind FORBIDDEN, classNames byte-for-byte from prototype, inline styles preserved. Applies to:
      - apps/web/app/_components/*.tsx (gallery shell + cards + notifications panels)
      - apps/web/app/_landing/**       (covers nested bento/*.tsx — public landing page sections + atoms)
    Enforced by .claude/hooks/validators/no_tailwind_in_prototype_port.py (ALLOWED_DIRS = ("_components", "_landing")).
    See .claude/rules/prototype-port-exception.md.
  new_components_use_phase6_css: 'NotificationsBell, NotificationToaster, PushPermissionPrompt, ServiceWorkerRegistrar use plain CSS classes from apps/web/app/styles/phase6.css. Page bodies (under /notifications, /messages, /settings/notifications) follow Tailwind rules per frontend-components.md.'
  sonner_toaster: 'NotificationToaster wraps Toaster from sonner@2.0.7. Mount at root layout. Call toast(), toast.success(), toast.error() anywhere.'

dev_commands:
  dev: 'pnpm dev:web (port 3000)'
  build: 'pnpm build (from monorepo root)'
  typecheck: 'pnpm typecheck'
  lint: 'pnpm lint'
  landing_visual_baselines: 'apps/web/tests/visual-baselines/landing/ — Playwright screenshots + report.md (from Task 5 of the landing port iteration). Use as the visual baseline when modifying anything under apps/web/app/_landing/ or apps/web/app/page.tsx.'

known_gotchas:
  - 'Tailwind v4 uses @tailwindcss/postcss — no tailwind.config.js needed; configure in CSS'
  - 'cookies() from next/headers is async in Next.js 15 — must await'
  - 'RSC-only context cannot set cookies — middleware handles cookie refresh'
  - 'React 19 has native form actions — use with server actions'
  - 'Never use SUPABASE_SERVICE_ROLE_KEY in client components'
  - 'Vercel Cron only fires in deployed Vercel envs — locally test via curl with Bearer ${CRON_SECRET}. CRON_SECRET must be set in apps/web/.env.local for local tests, and in Vercel Project Settings for prod.'
  - 'Phase 10 hot_score refresh is fire-and-forget from like/save/comment actions — do NOT await sb.rpc("refresh_hot_scores"); use .then(() => {}, () => {}) to avoid blocking the user response on a full-table rescore'
  - 'Topbar search in apps/web/app/_components/shell.tsx is wrapped in <form action="/search" method="get"> with name="q" — preserves all prototype-port className strings'
  - 'FeaturedHero on app/page.tsx reads from featured_apps for current Monday-anchored week and falls back to top-3 by hot_score'
  - "Public landing at / (apps/web/app/page.tsx) is now a Server Component orchestrator that fetches via fetchLandingData() and composes 11 sections from apps/web/app/_landing/. Signed-in users are redirected to /gallery. The page sets `export const revalidate = 60` — do NOT also add `export const dynamic = 'force-dynamic'` (mutually exclusive)."
  - "When importing AppRow from apps/web/app/_landing/data.ts into a Client Component (e.g. gallery-preview.tsx), MUST use `import type { AppRow }` — NEVER a value import. The file's other exports (fetchLandingData, LandingData) drag the server-only createSupabaseAdminClient into the client bundle if value-imported, which breaks the build."
  - 'packages/shared/src/index.ts re-exports no longer use `.js` extensions (e.g. `export * from "./types";`). Safe because MCP consumers import as type-only (`import type { Database } from "@hatch/shared"`) and Next.js webpack resolves no-ext imports correctly. Do not re-add `.js` suffixes.'
  - 'apps/web/app/_landing/avatar.tsx exports `LandingAvatar` (not `Avatar`) to avoid colliding with the existing `Avatar` export in apps/web/app/_components/cards.tsx. Both names are needed because shared infrastructure imports cards.tsx via path; keep them disjoint.'
  - 'Landing nav anchors use CSS class `.landing-nav` (NOT `.topbar-nav`) in apps/web/app/landing.css. The class was renamed from `.topbar-nav` to avoid future collision with any global .topbar-nav rule. The nav anchors (#features, #how, #agents, #gallery) are landing-specific concerns and the class name reflects that.'

new_deps:
  - '@asteasolutions/zod-to-openapi (^7) — used by /api/v1/openapi.json route to generate OpenAPI 3 from Zod schemas in apps/web/lib/zod/api.ts'

env_vars:
  CRON_SECRET: 'Bearer header value for /api/cron/* routes — set in Vercel Project Settings (prod) and apps/web/.env.local (local cron tests via curl)'
