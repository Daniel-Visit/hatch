    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.4s" fill="freeze"/>
    <animate attributeName="stroke-dashoffset" values="0;-14" dur="1.5s" begin="10s" repeatCount="indefinite"/>
