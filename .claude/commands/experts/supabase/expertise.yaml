# Supabase Expertise
# hatch — Supabase auth, SSR client config, realtime

overview:
  description: "Supabase auth provider, SSR client setup, realtime channels"
  project: "hatch (ref: vcbdtjjkkwryvmqbflah)"
  key_packages:
    - "@supabase/ssr@0.10.x (web)"
    - "@supabase/supabase-js@2.x (mcp)"

auth_flow:
  provider: "Supabase Auth (email/password)"
  server_side: "apps/web/lib/auth.ts exports getUser() (returns user|null) and requireUser() (redirects when unauthenticated); both read the session from cookies"
  session_refresh: "apps/web/middleware.ts refreshes the Supabase session cookie on every request"
  oauth_callback: "apps/web/app/auth/callback/ (Supabase OAuth redirect handler)"
  sign_out: "apps/web/app/auth/sign-out/"
  sign_in: "apps/web/app/(auth)/sign-in/"

client_setup:
  web_server_client: "apps/web/lib/supabase/server.ts — createServerClient() with cookie store (RLS-scoped to the signed-in user)"
  web_browser_client: "apps/web/lib/supabase/client.ts — createBrowserClient()"
  web_admin_client: "apps/web/lib/supabase/admin.ts — createSupabaseAdminClient(): server-only service-role client, persistSession:false; bypasses RLS for privileged server work"
  db_types: "apps/web/lib/supabase/types.ts — generated Database types (regenerated by the Supabase MCP after each migration)"
  mcp_client: "apps/mcp/src/supabase.ts — service role client for write ops"

database_migrations:
  package: "@hatch/db (packages/db/)"
  location: "packages/db/migrations/NNNN_name.sql — 40 numbered files, 0001_init → 0040_wanted_embeddings"
  rls_migrations: [0003_rls_phase1.sql, 0007_apps_rls.sql, 0010_social_rls.sql, 0017_phase6_rls.sql]
  apply_method: "Cloud-only (NO Supabase CLI, NO local Postgres/Docker). Applied via the Supabase MCP server (project ref vcbdtjjkkwryvmqbflah) from the controller agent. Manual fallback: paste SQL into Supabase Dashboard → SQL Editor → Run."
  types_regen: "After applying a migration, regenerate apps/web/lib/supabase/types.ts via the MCP."
  # Wanted feature — Phase 0 (0030–0034): 15 enums + 5 new tables
  wanted_tables:
    - "public.briefs (brief status lifecycle)"
    - "public.matches (app or builder candidates per brief; XOR constraint)"
    - "public.brief_refinement_turns (agent conversation audit)"
    - "public.brief_match_audit_logs (matcher run audit)"
    - "public.validator_suggestions (validator agent output)"
  wanted_schema_note: "types.ts has been regenerated to include all 5 Wanted tables, 15 enums, and the pgvector columns + cosine RPCs added in migration 0040. Re-export path: packages/shared/src/database.ts → apps/web/lib/supabase/types.ts"
  pgvector_columns:
    - "public.briefs.embedding vector(1024)"
    - "public.apps.embedding vector(1024)"
    - "public.profiles.capability_embedding vector(1024)"
  pgvector_rpcs:
    - "match_apps_by_embedding(query_embedding, match_count, exclude_saas, oss_only) → (id, distance)"
    - "match_builders_by_embedding(query_embedding, match_count) → (id, distance)"

realtime:
  thread_channel: "use-realtime-thread.ts — real-time comments/chat"
  notif_channel: "use-realtime-notifs.ts — real-time notification updates"

configuration:
  env_web:
    - NEXT_PUBLIC_SUPABASE_URL
    - NEXT_PUBLIC_SUPABASE_ANON_KEY
    - SUPABASE_SERVICE_ROLE_KEY (server-only)
    - VOYAGE_API_KEY (server-only; required for Voyage voyage-3 embedding generation)
  env_mcp:
    - SUPABASE_URL
    - SUPABASE_SERVICE_ROLE_KEY

best_practices:
  ssr: "Use @supabase/ssr createServerClient in Server Components and Route Handlers"
  cookies: "Server client reads/writes cookies via Next.js cookies() API"
  service_role: "Only use service role key in server-side code (Route Handlers, MCP server)"
  rls: "Rely on RLS — never bypass for user-facing operations"

key_file_locations:
  auth_helper: apps/web/lib/auth.ts
  middleware: apps/web/middleware.ts
  server_client: apps/web/lib/supabase/server.ts
  browser_client: apps/web/lib/supabase/client.ts
  admin_client: apps/web/lib/supabase/admin.ts
  db_types: apps/web/lib/supabase/types.ts
  mcp_client: apps/mcp/src/supabase.ts
  migrations: packages/db/migrations/
  auth_routes: apps/web/app/auth/
  sign_in: apps/web/app/(auth)/sign-in/

wanted_client_split:
  description: |
    Phase 1.5+2 (Wanted matching) established a hard rule for which Supabase client
    to use in Wanted route handlers:
  reads: |
    Use the session client (createSupabaseServerClient()) for all brief/app/profile reads.
    RLS enforces that only the author (and, for matches, the candidate) can read their own rows.
    Example: getBrief(session, id) in apps/web/app/api/v1/briefs/[id]/match/route.ts.
  writes: |
    Use the admin client (createSupabaseAdminClient()) for writes to matches,
    validator_suggestions, and brief_match_audit_logs. These tables have SELECT-only RLS
    (the agent pipelines must bypass RLS to insert on behalf of the system).
    Pattern in repos: apps/web/lib/wanted/match-repo.ts, match-audit-repo.ts, suggestion-repo.ts.
  fts_retrieval: |
    Full-text search over apps uses the session client:
      client.from('apps').textSearch('search_vector', q, { type: 'websearch' })
    The search_vector column has a GIN index (migration 0006). This is one of two
    retrieval paths — the other is semantic via pgvector cosine RPCs (migration 0040).
    Both paths are merged with RRF in CandidateRetriever.
  pgvector_retrieval: |
    Cosine-match RPCs (match_apps_by_embedding, match_builders_by_embedding) are called
    via the admin client (service role bypasses RLS) using rpc():
      adminClient.rpc('match_apps_by_embedding', { query_embedding, match_count, ... })
    The embedding parameter is a '[n1,n2,...]' Postgres vector literal string (not a JS
    array). The supabase-js client returns vector columns as `string | null`.
    Env var: VOYAGE_API_KEY (server-only; used by apps/web/lib/wanted/embed.ts to call
    Voyage voyage-3 before passing the embedding to these RPCs).
  thread_reuse: |
    When a match results in a new conversation (respond route), the route reuses the
    existing find_or_create_conversation RPC (same as messaging feature) and calls
    pushToUser() from apps/web/lib/push/server.ts to notify the candidate.
  embeddings_migration: |
    Migration 0040 added pgvector (Voyage voyage-3 / 1024 dims). Types regen was required
    after 0040. The schema is now at 40 migrations total (0001_init → 0040_wanted_embeddings).

architecture_summary: |
  Supabase Auth is the sole identity provider — no custom auth logic.
  Server Components call getUser() which uses @supabase/ssr cookie-based client.
  Browser components use createBrowserClient() for client-side auth state.
  MCP server uses service role key for privileged write operations.
  Realtime channels handle live comments and notifications.
  Schema is at 40 migrations. Phase 0 Wanted tables (briefs, matches, 3 audit tables)
  are now actively used (Phase 1.5+2 wired all routes). Migration 0040 added pgvector
  (Voyage voyage-3, 1024 dims): embedding columns on briefs/apps/profiles, HNSW cosine
  indexes, and security-invoker cosine-match RPCs. After every migration the types.ts
  must be regenerated via MCP; the re-export in packages/shared/src/database.ts
  propagates the new types to all workspace packages automatically.
  Wanted matching: reads via session client (RLS author/candidate), writes to matches +
  audit tables via admin client (SELECT-only RLS on those tables). Cosine-match RPCs
  also called via admin client (service role bypasses RLS). VOYAGE_API_KEY is required
  server-side for embedding generation (Voyage voyage-3).
