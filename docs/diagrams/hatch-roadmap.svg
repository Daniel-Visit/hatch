    <rect x="990" y="198" width="170" height="58" rx="8" fill="#0F172A" stroke="#10B981" stroke-width="1.5" filter="url(#glow-emerald)"/>
    <text x="1075" y="216" text-anchor="middle" font-size="12" font-weight="700" fill="#A7F3D0">Phase 11 ✓</text>
    <text x="1075" y="234" text-anchor="middle" font-size="9" fill="#94A3B8">search (tsvector)</text>
    <text x="1075" y="246" text-anchor="middle" font-size="9" fill="#94A3B8">+ topbar wire</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.5s" dur="0.5s" fill="freeze"/>
    <rect x="990" y="276" width="170" height="58" rx="8" fill="#0F172A" stroke="#10B981" stroke-width="1.5" filter="url(#glow-emerald)"/>
    <text x="1075" y="294" text-anchor="middle" font-size="12" font-weight="700" fill="#A7F3D0">Phase 12 ✓</text>
    <text x="1075" y="312" text-anchor="middle" font-size="9" fill="#94A3B8">public API +</text>
    <text x="1075" y="324" text-anchor="middle" font-size="9" fill="#94A3B8">llms.txt + OpenAPI</text>
  </g>

  <!-- ============ COLUMN 7: Phase 13 (pending) ============ -->
