<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 480" width="1300" height="480" font-family="'Inter', system-ui, sans-serif">
  <defs>
    <filter id="glow-emerald" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#10B981" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-amber" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#F59E0B" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-slate" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#64748B" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <marker id="arrow-emerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#10B981"/>
    </marker>
    <marker id="arrow-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="650" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#E2E8F0" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0s" dur="0.6s" fill="freeze"/>
    Hatch · 13-Phase Build · 12 shipped · 1 cut · 1 pending
  </text>
  <text x="650" y="58" text-anchor="middle" font-size="12" fill="#94A3B8" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.6s" fill="freeze"/>
    each pair groups phases for parallel execution via ADW
  </text>

  <!-- ============ COLUMN 1: Foundations (Phase 0 + 1) ============ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.5s" dur="0.5s" fill="freeze"/>
    <text x="115" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#94A3B8">FOUNDATIONS</text>
    <rect x="40" y="120" width="150" height="58" rx="8" fill="#0F172A" stroke="#10B981" stroke-width="1.5" filter="url(#glow-emerald)"/>
    <text x="115" y="138" text-anchor="middle" font-size="12" font-weight="700" fill="#A7F3D0">Phase 0 ✓</text>
    <text x="115" y="156" text-anchor="middle" font-size="9" fill="#94A3B8">monorepo +</text>
    <text x="115" y="168" text-anchor="middle" font-size="9" fill="#94A3B8">tooling</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.7s" dur="0.5s" fill="freeze"/>
    <rect x="40" y="198" width="150" height="58" rx="8" fill="#0F172A" stroke="#10B981" stroke-width="1.5" filter="url(#glow-emerald)"/>
    <text x="115" y="216" text-anchor="middle" font-size="12" font-weight="700" fill="#A7F3D0">Phase 1 ✓</text>
    <text x="115" y="234" text-anchor="middle" font-size="9" fill="#94A3B8">auth +</text>
    <text x="115" y="246" text-anchor="middle" font-size="9" fill="#94A3B8">base schema</text>
  </g>

  <!-- ============ COLUMN 2: Pair 1 (2+3) ============ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.0s" dur="0.5s" fill="freeze"/>
    <text x="305" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#94A3B8">PAIR 1</text>
    <rect x="230" y="120" width="150" height="58" rx="8" fill="#0F172A" stroke="#10B981" stroke-width="1.5" filter="url(#glow-emerald)"/>
    <text x="305" y="138" text-anchor="middle" font-size="12" font-weight="700" fill="#A7F3D0">Phase 2 ✓</text>
    <text x="305" y="156" text-anchor="middle" font-size="9" fill="#94A3B8">design system</text>
    <text x="305" y="168" text-anchor="middle" font-size="9" fill="#94A3B8">+ Shell</text>
  </g>
  <g opacity="0">
