  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.0s" dur="0.5s" fill="freeze"/>
    <text x="685" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#94A3B8">PAIR 3</text>
    <rect x="610" y="120" width="150" height="58" rx="8" fill="#0F172A" stroke="#10B981" stroke-width="1.5" filter="url(#glow-emerald)"/>
    <text x="685" y="138" text-anchor="middle" font-size="12" font-weight="700" fill="#A7F3D0">Phase 6 ✓</text>
    <text x="685" y="156" text-anchor="middle" font-size="9" fill="#94A3B8">contact + notifs</text>
    <text x="685" y="168" text-anchor="middle" font-size="9" fill="#94A3B8">+ Web Push</text>
  </g>
  <g opacity="0">
