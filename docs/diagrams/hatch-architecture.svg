<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" width="1100" height="720" font-family="'Inter', system-ui, sans-serif">
  <defs>
    <!-- Glow filters -->
    <filter id="glow-cyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#22D3EE" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-violet" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#A855F7" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-emerald" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#10B981" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-amber" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#F59E0B" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-rose" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#F43F5E" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#22D3EE"/>
    </marker>
    <marker id="arrow-violet" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#A855F7"/>
    </marker>
    <marker id="arrow-emerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#10B981"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#F59E0B"/>
    </marker>
  </defs>

  <!-- ============ TIER 1: CLIENTS (y 60–180) ============ -->

  <!-- Browser -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.6s" fill="freeze"/>
    <rect x="110" y="70" width="200" height="100" rx="10" fill="#0F172A" stroke="#22D3EE" stroke-width="1.5" filter="url(#glow-cyan)"/>
    <text x="210" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#A5F3FC">Browser</text>
    <text x="210" y="124" text-anchor="middle" font-size="10" fill="#94A3B8">human user</text>
    <text x="210" y="146" text-anchor="middle" font-size="10" font-family="monospace" fill="#67E8F9">hatch-brown.vercel.app</text>
  </g>

  <!-- External Agent / curl -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.5s" dur="0.6s" fill="freeze"/>
    <rect x="450" y="70" width="200" height="100" rx="10" fill="#0F172A" stroke="#F59E0B" stroke-width="1.5" filter="url(#glow-amber)"/>
    <text x="550" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#FDE68A">External Agent</text>
    <text x="550" y="124" text-anchor="middle" font-size="10" fill="#94A3B8">curl / crawler / script</text>
    <text x="550" y="146" text-anchor="middle" font-size="10" font-family="monospace" fill="#FCD34D">/api/v1/* + /llms.txt</text>
  </g>

  <!-- Claude Desktop -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.8s" dur="0.6s" fill="freeze"/>
    <rect x="790" y="70" width="200" height="100" rx="10" fill="#0F172A" stroke="#A855F7" stroke-width="1.5" filter="url(#glow-violet)"/>
    <text x="890" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#DDD6FE">Claude Desktop</text>
    <text x="890" y="124" text-anchor="middle" font-size="10" fill="#94A3B8">MCP client</text>
    <text x="890" y="146" text-anchor="middle" font-size="10" font-family="monospace" fill="#C4B5FD">Bearer hatch_pat_*</text>
  </g>

  <!-- ============ TIER 2: SERVICES (y 240–460) ============ -->

  <!-- Vercel (Next.js web) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.6s" fill="freeze"/>
    <rect x="60" y="240" width="620" height="220" rx="12" fill="#0F172A" stroke="#22D3EE" stroke-width="1.5" filter="url(#glow-cyan)"/>
    <text x="80" y="268" font-size="13" font-weight="700" fill="#67E8F9">VERCEL</text>
    <text x="370" y="268" text-anchor="middle" font-size="16" font-weight="700" fill="#A5F3FC">apps/web · Next.js 15 + React 19</text>

    <!-- Inner blocks -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.0s" dur="0.5s" fill="freeze"/>
      <rect x="80" y="288" width="160" height="56" rx="6" fill="#1E293B" stroke="#22D3EE" stroke-width="1"/>
      <text x="160" y="308" text-anchor="middle" font-size="11" font-weight="600" fill="#A5F3FC">Server Components</text>
      <text x="160" y="324" text-anchor="middle" font-size="9" fill="#94A3B8">/ /a/:slug /u/:handle</text>
      <text x="160" y="336" text-anchor="middle" font-size="9" fill="#94A3B8">/trending /following /search</text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.5s" fill="freeze"/>
      <rect x="252" y="288" width="160" height="56" rx="6" fill="#1E293B" stroke="#22D3EE" stroke-width="1"/>
      <text x="332" y="308" text-anchor="middle" font-size="11" font-weight="600" fill="#A5F3FC">Server Actions</text>
      <text x="332" y="324" text-anchor="middle" font-size="9" fill="#94A3B8">like save follow comment</text>
      <text x="332" y="336" text-anchor="middle" font-size="9" fill="#94A3B8">publish messages api-keys</text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.4s" dur="0.5s" fill="freeze"/>
      <rect x="424" y="288" width="240" height="56" rx="6" fill="#1E293B" stroke="#F59E0B" stroke-width="1"/>
      <text x="544" y="308" text-anchor="middle" font-size="11" font-weight="600" fill="#FDE68A">/api/v1/* · CORS open · 60/min/IP</text>
      <text x="544" y="324" text-anchor="middle" font-size="9" font-family="monospace" fill="#FCD34D">apps · apps/:slug · profiles/:handle</text>
      <text x="544" y="336" text-anchor="middle" font-size="9" font-family="monospace" fill="#FCD34D">categories · search · openapi.json</text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.6s" dur="0.5s" fill="freeze"/>
      <rect x="80" y="356" width="160" height="40" rx="6" fill="#1E293B" stroke="#22D3EE" stroke-width="1"/>
      <text x="160" y="372" text-anchor="middle" font-size="10" font-weight="600" fill="#A5F3FC">/llms.txt</text>
      <text x="160" y="386" text-anchor="middle" font-size="9" fill="#94A3B8">llmstxt.org index</text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.8s" dur="0.5s" fill="freeze"/>
      <rect x="252" y="356" width="160" height="40" rx="6" fill="#1E293B" stroke="#22D3EE" stroke-width="1"/>
      <text x="332" y="372" text-anchor="middle" font-size="10" font-weight="600" fill="#A5F3FC">middleware.ts</text>
      <text x="332" y="386" text-anchor="middle" font-size="9" fill="#94A3B8">Supabase session refresh</text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>
      <rect x="424" y="356" width="240" height="40" rx="6" fill="#1E293B" stroke="#F43F5E" stroke-width="1" filter="url(#glow-rose)"/>
      <text x="544" y="372" text-anchor="middle" font-size="10" font-weight="600" fill="#FECDD3">/api/cron/* · Bearer CRON_SECRET</text>
      <text x="544" y="386" text-anchor="middle" font-size="9" fill="#94A3B8">refresh-scores · pick-featured (manual)</text>
    </g>

    <text x="370" y="430" text-anchor="middle" font-size="11" fill="#64748B" font-style="italic">Web Push (VAPID) · /settings/* · /messages · /notifications · /publish</text>
  </g>

  <!-- Railway (MCP server) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.6s" fill="freeze"/>
    <rect x="720" y="240" width="320" height="220" rx="12" fill="#0F172A" stroke="#A855F7" stroke-width="1.5" filter="url(#glow-violet)"/>
    <text x="740" y="268" font-size="13" font-weight="700" fill="#C4B5FD">RAILWAY</text>
    <text x="880" y="268" text-anchor="middle" font-size="16" font-weight="700" fill="#DDD6FE">apps/mcp</text>

    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.4s" dur="0.5s" fill="freeze"/>
      <rect x="740" y="288" width="280" height="40" rx="6" fill="#1E293B" stroke="#A855F7" stroke-width="1"/>
      <text x="880" y="306" text-anchor="middle" font-size="10" font-weight="600" fill="#DDD6FE">POST /mcp · Streamable HTTP</text>
      <text x="880" y="320" text-anchor="middle" font-size="9" font-family="monospace" fill="#C4B5FD">@modelcontextprotocol/sdk · Bearer auth</text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.6s" dur="0.5s" fill="freeze"/>
      <rect x="740" y="340" width="86" height="46" rx="6" fill="#1E293B" stroke="#A855F7" stroke-width="1"/>
      <text x="783" y="358" text-anchor="middle" font-size="11" font-weight="700" fill="#DDD6FE">15 tools</text>
      <text x="783" y="372" text-anchor="middle" font-size="8" fill="#94A3B8">read · publish</text>
      <text x="783" y="382" text-anchor="middle" font-size="8" fill="#94A3B8">social</text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.8s" dur="0.5s" fill="freeze"/>
      <rect x="837" y="340" width="86" height="46" rx="6" fill="#1E293B" stroke="#A855F7" stroke-width="1"/>
      <text x="880" y="358" text-anchor="middle" font-size="11" font-weight="700" fill="#DDD6FE">3 resources</text>
      <text x="880" y="372" text-anchor="middle" font-size="8" fill="#94A3B8">app · profile</text>
      <text x="880" y="382" text-anchor="middle" font-size="8" fill="#94A3B8">notifications</text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>
      <rect x="934" y="340" width="86" height="46" rx="6" fill="#1E293B" stroke="#A855F7" stroke-width="1"/>
      <text x="977" y="358" text-anchor="middle" font-size="11" font-weight="700" fill="#DDD6FE">3 prompts</text>
      <text x="977" y="372" text-anchor="middle" font-size="8" fill="#94A3B8">draft · review</text>
      <text x="977" y="382" text-anchor="middle" font-size="8" fill="#94A3B8">compose</text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.2s" dur="0.5s" fill="freeze"/>
      <rect x="740" y="398" width="280" height="32" rx="6" fill="#1E293B" stroke="#22D3EE" stroke-width="1"/>
      <text x="880" y="418" text-anchor="middle" font-size="10" font-weight="600" fill="#A5F3FC">GET /health · Railpack (corepack pnpm 10)</text>
    </g>

    <text x="880" y="450" text-anchor="middle" font-size="11" fill="#64748B" font-style="italic">hatch-mcp-production.up.railway.app</text>
  </g>

  <!-- ============ TIER 3: DATA (y 520–700) ============ -->

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.8s" dur="0.6s" fill="freeze"/>
    <rect x="60" y="510" width="980" height="190" rx="12" fill="#0F172A" stroke="#10B981" stroke-width="1.5" filter="url(#glow-emerald)"/>
    <text x="80" y="538" font-size="13" font-weight="700" fill="#6EE7B7">SUPABASE</text>
    <text x="550" y="538" text-anchor="middle" font-size="16" font-weight="700" fill="#A7F3D0">Postgres 14.5 + Auth + Storage + Realtime + pg_cron</text>

    <!-- Tables row -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="4.4s" dur="0.5s" fill="freeze"/>
      <rect x="80" y="556" width="940" height="50" rx="6" fill="#1E293B" stroke="#10B981" stroke-width="1"/>
      <text x="100" y="574" font-size="10" font-weight="700" fill="#6EE7B7">tables (16) ·</text>
      <text x="100" y="592" font-size="10" font-family="monospace" fill="#A7F3D0">profiles · categories · apps · likes saves follows comments · contact_requests conversations messages</text>
      <text x="100" y="602" font-size="10" font-family="monospace" fill="#A7F3D0">notifications push_subscriptions · api_keys · featured_apps api_rate_limits</text>
    </g>

    <!-- Functions row -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="4.7s" dur="0.5s" fill="freeze"/>
      <rect x="80" y="616" width="540" height="36" rx="6" fill="#1E293B" stroke="#10B981" stroke-width="1"/>
      <text x="100" y="632" font-size="10" font-weight="700" fill="#6EE7B7">functions ·</text>
      <text x="100" y="646" font-size="9" font-family="monospace" fill="#A7F3D0">compute_hot_score · refresh_hot_scores · pick_featured_app · increment_rate_limit · find_or_create_conversation</text>
    </g>

    <!-- pg_cron row -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="4.9s" dur="0.5s" fill="freeze"/>
      <rect x="632" y="616" width="388" height="36" rx="6" fill="#1E293B" stroke="#F43F5E" stroke-width="1" filter="url(#glow-rose)"/>
      <text x="652" y="632" font-size="10" font-weight="700" fill="#FECDD3">pg_cron ·</text>
      <text x="652" y="646" font-size="9" font-family="monospace" fill="#FCA5A5">refresh-hot-scores */15min · pick-featured-app Mon 09:00</text>
    </g>

    <!-- Auth + Storage row -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="5.1s" dur="0.5s" fill="freeze"/>
      <rect x="80" y="662" width="460" height="28" rx="6" fill="#1E293B" stroke="#10B981" stroke-width="1"/>
      <text x="100" y="680" font-size="10" fill="#A7F3D0">Auth · GitHub + Google OAuth · handle_new_user trigger</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="5.2s" dur="0.5s" fill="freeze"/>
      <rect x="552" y="662" width="468" height="28" rx="6" fill="#1E293B" stroke="#10B981" stroke-width="1"/>
      <text x="572" y="680" font-size="10" fill="#A7F3D0">Storage · app-covers bucket + RLS · Realtime · notifications / messages</text>
    </g>
  </g>

  <!-- ============ CONNECTIONS ============ -->

  <!-- Browser → Vercel -->
  <line x1="210" y1="172" x2="210" y2="240" stroke="#22D3EE" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow-cyan)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.4s" fill="freeze"/>
    <animate attributeName="stroke-dashoffset" values="0;-18" dur="1.5s" begin="10s" repeatCount="indefinite"/>
  </line>
  <text x="217" y="208" font-size="9" font-family="monospace" fill="#67E8F9" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.4s" fill="freeze"/>HTTPS
  </text>

  <!-- External Agent → /api/v1 -->
  <line x1="550" y1="172" x2="544" y2="288" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow-amber)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.0s" dur="0.4s" fill="freeze"/>
    <animate attributeName="stroke-dashoffset" values="0;-18" dur="1.5s" begin="10s" repeatCount="indefinite"/>
  </line>
  <text x="556" y="218" font-size="9" font-family="monospace" fill="#FCD34D" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.0s" dur="0.4s" fill="freeze"/>CORS *
  </text>

  <!-- Claude Desktop → MCP -->
  <line x1="890" y1="172" x2="880" y2="288" stroke="#A855F7" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow-violet)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.4s" fill="freeze"/>
    <animate attributeName="stroke-dashoffset" values="0;-18" dur="1.5s" begin="10s" repeatCount="indefinite"/>
  </line>
  <text x="897" y="220" font-size="9" font-family="monospace" fill="#C4B5FD" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.4s" fill="freeze"/>JSON-RPC
  </text>

  <!-- Vercel → Supabase (anon) -->
  <line x1="240" y1="460" x2="240" y2="510" stroke="#10B981" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow-emerald)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="4.0s" dur="0.4s" fill="freeze"/>
    <animate attributeName="stroke-dashoffset" values="0;-18" dur="1.5s" begin="10s" repeatCount="indefinite"/>
  </line>
  <text x="247" y="488" font-size="9" font-family="monospace" fill="#6EE7B7" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="4.0s" dur="0.4s" fill="freeze"/>anon · RLS
  </text>

  <!-- /api/cron → Supabase (service-role) -->
  <line x1="544" y1="396" x2="544" y2="510" stroke="#F43F5E" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow-emerald)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="4.2s" dur="0.4s" fill="freeze"/>
    <animate attributeName="stroke-dashoffset" values="0;-18" dur="1.5s" begin="10s" repeatCount="indefinite"/>
  </line>
  <text x="551" y="468" font-size="9" font-family="monospace" fill="#FCA5A5" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="4.2s" dur="0.4s" fill="freeze"/>service_role
  </text>

  <!-- Railway → Supabase (service-role) -->
  <line x1="880" y1="460" x2="880" y2="510" stroke="#10B981" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow-emerald)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="4.4s" dur="0.4s" fill="freeze"/>
    <animate attributeName="stroke-dashoffset" values="0;-18" dur="1.5s" begin="10s" repeatCount="indefinite"/>
  </line>
  <text x="887" y="488" font-size="9" font-family="monospace" fill="#6EE7B7" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="4.4s" dur="0.4s" fill="freeze"/>service_role
  </text>

  <!-- ============ TITLE + idle pulse ============ -->
  <text x="550" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#E2E8F0" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0s" dur="0.6s" fill="freeze"/>
    Hatch · Architecture
  </text>

  <!-- Subtle border pulse on tiers -->
  <rect x="60" y="510" width="980" height="190" rx="12" fill="none" stroke="#10B981" stroke-width="0.8" opacity="0">
    <animate attributeName="opacity" values="0;0.35;0" dur="4s" begin="10s" repeatCount="indefinite"/>
  </rect>
</svg>
